name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            warzongg-api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix warzongg-api

      - name: JavaScript syntax check
        run: |
          find . \
            -path "./node_modules" -prune -o \
            -path "./warzongg-api/node_modules" -prune -o \
            -name "*.js" -print | while read -r file; do
              node --check "$file"
            done
